server:
  port: 18080
  servlet:
    context-path: /api

spring:
  application:
    name: right-mange
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/right_manage?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  web:
    resources:
      static-locations: file:C:/Users/dwt/AppData/Local/uploadAttachment
  # 鏂囦欢涓婁紶閰嶇疆
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

# JWT閰嶇疆
jwt:
  secret: right-manage-secret-key-2024
  expiration: 86400000
  header: Authorization
  token-prefix: Bearer

# 鏃ュ織閰嶇疆
logging:
  level:
    com.rightmanage: debug
    org.springframework.security: debug

# 鏂囦欢涓婁紶閰嶇疆
file:
  upload:
    path: C:/Users/dwt/AppData/Local/uploadAttachment
  access:
    prefix: /api/files


